server.port=${SERVER_PORT:8080}

# MySQL DataSource
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:lara_dashboard}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:Pass@32997}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:LaRaCareSecretKey2024VeryLongSecretForHMACSHA256SigningKey}
app.jwt.expiration-ms=${JWT_EXPIRATION:86400000}

# Admin Seed
app.admin.email=${ADMIN_EMAIL:admin@lara.ai}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
app.admin.name=${ADMIN_NAME:LaRa System Admin}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging
logging.level.com.lara.dashboard=INFO
logging.level.org.springframework.security=WARN
